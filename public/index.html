<!DOCTYPE html>
<html lang="en" class="-landing">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hipp, Hipp, Hurra!</title>
<link rel="stylesheet" href="./styles/main.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
<div class="c-landing">
  <div class="c-landing_body">
    <h1>Hipp<span class="u-font -core">,</span> Hipp<span class="u-font -core">,</span> Hurra<span class="u-font -core">!</span></h1>
    <h2 class="c-landing_title u-font -quinoa"> die Hochzeit ist bald da!</h2>

    <p>& du bist herzlichst eingeladen</p>
    <div class="c-landing_form">
      <input id="username" type="text" placeholder="Username">
      <input id="password" type="password" placeholder="Passwort">
      <button class="g-btn" onclick="login()">Login</button>
      <p id="error" style="color:red;"></p>
    </div>
  </div>

</div>

<script>
async function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  const headers = new Headers();
  headers.append('Authorization', 'Basic ' + btoa(user + ':' + pass));

  try {
    const res = await fetch('/api/auth', { headers });
    if(res.status === 200) {
      window.location.href = '/protected'; // or show content inline
    } else if(res.status === 401) {
      document.getElementById('error').textContent = 'Falsche Logindaten';
    } else {
      document.getElementById('error').textContent = 'Server error';
    }
  } catch(e) {
    document.getElementById('error').textContent = 'Network error';
  }
}
</script>
</body>
</html>
